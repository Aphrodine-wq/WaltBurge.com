        <h1>Walt Burge — Full-Stack Developer & AI Engineer</h1>
        <p>I build construction technology. From two-sided contractor marketplaces to custom AI estimation models, I write software that solves real problems in the construction industry.</p>

        <h2>Projects</h2>
        <ul>
          <li><strong>FairTradeWorker</strong> — Two-sided construction marketplace connecting homeowners with vetted contractors. Next.js, Kotlin/Spring Boot, React Native. QuickBooks-native payments and AI-powered estimation.</li>
          <li><strong>MsHomePros</strong> — Contractor business platform with AI-powered line-item estimation, professional proposals, and job tracking. Live client: MHP Construction, Oxford, MS.</li>
          <li><strong>ConstructionAI</strong> — Fine-tuned Llama 3.1 8B for construction cost estimation. 18,000+ training examples. Deployed on RunPod Serverless at ~$0.002 per estimate.</li>
          <li><strong>Tessera</strong> — A markdown-native programming language for AI agents. Agents are written in .t.md files as substrate-tagged code fences, formally verified by AEON before they run, and executed on Ollama, Anthropic, LangChain, and PyTorch backends. Python.</li>
          <li><strong>W.A.L.T.</strong> — Distributed AI platform across three machines. 64 MCP tools for screen understanding, 73-engine formal verification, autonomous overnight execution.</li>
          <li><strong>Driftlands</strong> — Survival crafting game in Rust/Bevy. 27K lines of code, 43 Bevy plugins, targeting Steam Early Access.</li>
          <li><strong>WOS</strong> — Custom Linux distribution based on Nobara for gaming, AI development, and cybersecurity.</li>
        </ul>

        <h2>Blog — The Build Log</h2>
        <ul>
          <li>
            <a href="https://waltburge.com/blog/tessera-markdown-native-agents"><strong>Tessera: Why I'm Writing AI Agents in Markdown</strong></a>
            — Building an AI agent shouldn't require five frameworks, three vendor SDKs, and a vector DB you babysit. It should require markdown and a compiler that takes the substrate boundaries seriously. The case for .t.md files as the source of truth for agents.
          </li>
          <li>
            <a href="https://waltburge.com/blog/tessera-substrates"><strong>Substrates: Giving an Agent Named Modes of Thinking</strong></a>
            — Tessera agents are built from typed code fences — logic, agent, memory, prompt, tool, neural. The compiler enforces the boundaries between them, so an agent's architecture becomes legible and auditable instead of a blob of Python.
          </li>
          <li>
            <a href="https://waltburge.com/blog/tessera-verify-before-run"><strong>Verifying AI Agents Before They Ever Run</strong></a>
            — Tessera lowers each agent to a Substrate IR and runs AEON's 73 formal-verification engines against it before execution, catching capability leaks and PII egress at compile time. No other agent framework does formal verification before run.
