<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Walt Burge | Full Systems Engineer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              brand: {
                black: 'rgb(var(--bg-primary) / <alpha-value>)',
                dark: 'rgb(var(--bg-secondary) / <alpha-value>)',
                surface: 'rgb(var(--bg-surface) / <alpha-value>)',
                border: 'rgb(var(--border-color) / <alpha-value>)',
                accent: 'rgb(var(--accent-color) / <alpha-value>)',
                purple: '#c084fc', 
                success: '#4ade80',
                primary: 'rgb(var(--text-primary) / <alpha-value>)',
                secondary: 'rgb(var(--text-secondary) / <alpha-value>)',
              }
            },
            backgroundImage: {
              'grid-pattern': "linear-gradient(to right, rgb(var(--border-color)) 1px, transparent 1px), linear-gradient(to bottom, rgb(var(--border-color)) 1px, transparent 1px)",
              'radial-fade': 'radial-gradient(circle at center, rgba(var(--accent-color), 0.05) 0%, transparent 70%)',
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'slide-up': 'slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'scan': 'scan 2s linear infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              scan: {
                '0%': { transform: 'translateY(-100%)' },
                '100%': { transform: 'translateY(200%)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --bg-primary: 3 3 3;
        --bg-secondary: 10 10 10;
        --bg-surface: 18 18 18;
        --text-primary: 229 229 229;
        --text-secondary: 156 163 175;
        --border-color: 42 42 42;
        --accent-color: 34 211 238;
      }

      .light-mode {
        --bg-primary: 255 255 255;
        --bg-secondary: 252 252 252;
        --bg-surface: 248 248 248;
        --text-primary: 0 0 0;
        --text-secondary: 60 60 60;
        --border-color: 220 220 220;
        --accent-color: 6 182 212;
      }

      body {
        background-color: rgb(var(--bg-primary));
        color: rgb(var(--text-primary));
        overflow-x: hidden;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      ::selection {
        background: rgba(var(--accent-color), 0.2);
        color: rgb(var(--accent-color));
      }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgb(var(--bg-primary));
      }
      ::-webkit-scrollbar-thumb {
        background: rgb(var(--border-color));
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgb(var(--text-secondary));
      }

      .glass-panel {
        background: rgba(var(--bg-surface), 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(var(--text-primary), 0.05);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      }
      
      .glass-card {
        background: linear-gradient(180deg, rgba(var(--bg-secondary), 0.4) 0%, rgba(var(--bg-secondary), 0.6) 100%);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(var(--text-primary), 0.05);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .glass-card:hover {
        border-color: rgba(var(--accent-color), 0.3);
        box-shadow: 0 0 20px rgba(var(--accent-color), 0.05);
        transform: translateY(-2px);
      }

      .text-glow {
        text-shadow: 0 0 20px rgb(var(--accent-color) / 0.5);
        filter: drop-shadow(0 0 8px rgb(var(--accent-color) / 0.5));
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
